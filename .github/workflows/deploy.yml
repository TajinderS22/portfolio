name: Deploy on Prod

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Setup SSH
        env:
          HOST: ${{ secrets.PROD_HOST }}
          USER: ${{ secrets.PROD_USER }}
          KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          echo "$KEY" > key.pem
          chmod 600 key.pem

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          cat >> ~/.ssh/config <<END
          Host prod
            HostName $HOST
            User $USER
            IdentityFile ./key.pem
            StrictHostKeyChecking no
          END

      - name: Pull and Deploy on VM
        run: |
          ssh prod "
            set -e

            # Load nvm
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
            nvm install 22 
            nvm use 22


            npm install -g pm2



            echo '--- Node version ---'
            node -v
            npm -v
            pm2 -v

            echo '--- Switching to project directory ---'
            cd /home/ubuntu/portfolio
            npm run build

            pm2 restart all

          "
